<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEXTY</title>

<script src="/socket.io/socket.io.js"></script>
<script defer src="client.js"></script>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
}

#loginScreen{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
background:#111;
border:1px solid #00ff88;
color:white;
}

button{
padding:10px 15px;
background:#00ff88;
border:none;
cursor:pointer;
font-weight:bold;
}

#app{
display:none;
height:100vh;
flex-direction:column;
}

#topBar{
background:#00ff88;
color:black;
padding:15px;
display:flex;
justify-content:space-between;
}

#chatBox{
flex:1;
padding:20px;
overflow-y:auto;
}

.msg{
margin-bottom:10px;
}

.username{
color:#00ff88;
cursor:pointer;
font-weight:bold;
}

#inputBar{
display:flex;
padding:10px;
background:#111;
}

#messageInput{
flex:1;
margin-right:10px;
}

#settingsScreen{
display:none;
padding:20px;
}

</style>
</head>

<body>

<div id="loginScreen">

<h1>Welcome to TEXTY</h1>

<input id="usernameInput" placeholder="Username"><br><br>
<input id="passwordInput" placeholder="Password" type="password"><br><br>

<button id="loginBtn">Login / Register</button>

<p id="loginError"></p>

</div>


<div id="app">

<div id="topBar">

<span id="userDisplay"></span>

<button id="settingsBtn">Settings</button>

</div>

<div id="chatBox"></div>

<div id="settingsScreen">

<h2>Settings</h2>

<h3>Change Bio</h3>

<input id="bioInput">
<button id="saveBio">Save Bio</button>

</div>

<div id="inputBar">

<input id="messageInput" placeholder="Type message">

<button id="sendBtn">Send</button>

</div>

</div>

</body>
</html>
